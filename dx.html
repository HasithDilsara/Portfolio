    <style>
        :root {
            --bg-dark: #100c27;
            --accent-cyan: #00f3ff;
            --glass-bg: rgba(15, 15, 15, 0.85); /* Darker to block the grid */
            --glass-border: rgba(255, 255, 255, 0.1);
            --text-main: #e0e0e0;
        }

        body {
            background-color: var(--bg-dark);
            color: var(--text-main);
            font-family: 'Space Grotesk', sans-serif;
            margin: 0;
            overflow-x: hidden;
        }

        /* --- 1. Background Grid (Locked to the back) --- */
        .grid-bg {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background-image: 
                linear-gradient(to right, rgba(46, 148, 153, 0.841) 1px, transparent 1px),
                linear-gradient(to bottom, rgba(64, 185, 191, 0.604) 1px, transparent 1px);
            background-size: 50px 50px;
            mask-image: radial-gradient(ellipse at 50% 50%, black 20%, transparent 80%);
            -webkit-mask-image: radial-gradient(ellipse at 50% 50%, black 20%, transparent 80%);
            z-index: -1; /* Bottom Layer */
            animation: gridMove 20s linear infinite;
            pointer-events: none;
        }

        @keyframes gridMove {
            from { background-position: 0 0; }
            to { background-position: 0 1000px; }
        }

        /* --- 2. Main Container (Layered above grid) --- */
        .container { 
            max-width: 1300px; 
            margin: 50px auto; 
            padding: 20px; 
            position: relative; 
            z-index: 10; /* Middle Layer */
        }

        h1 { font-family: 'Space Grotesk', sans-serif; letter-spacing: 4px; color: var(--accent-cyan); }
        h3 { font-weight: 300; opacity: 0.7; margin-bottom: 40px; }

        .bento-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
            grid-auto-rows: 250px;
            gap: 20px;
        }

        /* --- 3. Card Styles (The Top Layer) --- */
        .card {
            background: var(--glass-bg);
            border: 1px solid var(--glass-border);
            border-radius: 20px;
            overflow: hidden;
            position: relative;
            cursor: pointer;
            transition: 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            display: flex;
            flex-direction: column;
            justify-content: flex-end;
            padding: 20px;
            backdrop-filter: blur(20px); /* Blurs the grid behind the card */
        }

        .card:hover { 
            border-color: var(--accent-cyan); 
            transform: translateY(-5px);
            box-shadow: 0 10px 30px rgba(0, 243, 255, 0.15);
        }

        /* Sizing modifiers */
        .large { grid-column: span 2; grid-row: span 2; }
        .wide { grid-column: span 2; }

        .card img {
            position: absolute;
            top: 0; left: 0; width: 100%; height: 100%;
            object-fit: cover;
            opacity: 0.8;
            z-index: -1;
            transition: 0.4s;
        }
        .card:hover img { opacity: 0.9; }

        .card h4 { margin: 0; text-transform: uppercase; letter-spacing: 1px; }

        /* --- 4. Popup Modal --- */
        .modal {
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0, 0, 0, 0.95);
            backdrop-filter: blur(20px);
            display: none; 
            justify-content: center;
            align-items: center;
            z-index: 1000; /* Highest Layer */
        }

        .modal-content {
            max-width: 90%;
            max-height: 85%;
            border: 1px solid var(--accent-cyan);
            border-radius: 15px;
            box-shadow: 0 0 50px rgba(0, 243, 255, 0.3);
        }

        .close-btn {
            position: absolute;
            top: 30px; right: 40px;
            font-size: 3rem;
            color: var(--accent-cyan);
            cursor: pointer;
        }

        @media (max-width: 768px) {
            .large, .wide { grid-column: span 1; grid-row: span 1; }
        }
        .home {
            position: fixed;
            top: 20px; left: 20px;
            color: var(--accent-cyan);
            text-decoration: none;
            font-weight: 500;
            z-index: 1001; /* Above modal */
        }
        /* Floating social icons (right side stacked) */
        .social-side {
            position: fixed;
            right: 20px;
            bottom: 120px;
            display: flex;
            flex-direction: column;
            gap: 12px;
            z-index: 1002;
        }

        .social-side a {
            width: 56px;
            height: 56px;
            border-radius: 12px;
            display: inline-flex;
            align-items: center;
            justify-content: center;
            background: rgba(255,255,255,0.04);
            color: #fff;
            text-decoration: none;
            transition: transform 200ms ease, box-shadow 200ms ease, background 200ms ease;
            box-shadow: 0 6px 18px rgba(2,6,23,0.45);
        }

        .social-side a:hover {
            transform: translateY(-6px) scale(1.03);
            box-shadow: 0 14px 30px rgba(0,0,0,0.45);
        }

        .social-side .whatsapp { background: linear-gradient(135deg,#25D366,#128C7E); }
        .social-side .facebook { background: linear-gradient(135deg,#1877F2,#1755C6); }
        .social-side .instagram { background: linear-gradient(135deg,#f09433,#e6683c,#cc2a7b,#4f5bd5); }
        .social-side .tiktok { background: linear-gradient(135deg,#010101,#1b1b1b); }

        .social-side svg { width: 22px; height: 22px; display: block; }

        @media (max-width: 760px) {
            .social-side { display: none; }
        }
    </style>
</head>

        ];

        const grid = document.getElementById('portfolio-grid');
        const modal = document.getElementById('design-modal');
        const modalImg = document.getElementById('modal-img');

        // INJECT CARDS
        designSamples.forEach(sample => {
            const card = document.createElement('div');
            card.className = `card ${sample.type}`;
            card.innerHTML = `
                <img src="${sample.img}" alt="${sample.title}" onerror="this.src='https://via.placeholder.com/400x400/111/00f3ff?text=Design+Not+Found'">
                <h4>${sample.title}</h4>
            `;
            card.onclick = () => openPopup(sample.img);
            grid.appendChild(card);
        });

        function openPopup(imgSrc) {
            modal.style.display = 'flex';
            modalImg.src = imgSrc;
            document.body.style.overflow = 'hidden'; // Stop scrolling when open
        }

        function closePopup() {
            modal.style.display = 'none';
            document.body.style.overflow = 'auto'; // Resume scrolling
        }

        // Close on background click
        window.onclick = (e) => { if(e.target == modal) closePopup(); }
    </script>
